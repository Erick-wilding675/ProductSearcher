  <!-- lente -->
  <circle cx="222" cy="222" r="120" fill="none" stroke="#FFFFFF" stroke-width="34"/>
  <!-- barras de ranking dentro da lente -->
  <g fill="#FFFFFF">
    <rect x="174" y="238" width="27" height="46" rx="9"/>
    <rect x="209" y="210" width="27" height="74" rx="9"/>
    <rect x="244" y="180" width="27" height="104" rx="9"/>
