# Dev local reprodutível (RNF-04): Postgres (pgvector) + API + worker.
# Uso: docker compose up
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: productsearcher
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/productsearcher
      AI_ENABLED: "false"
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./worker
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/productsearcher
    depends_on:
      db:
        condition: service_healthy
    profiles: ["jobs"]  # roda sob demanda: docker compose run --rm worker

volumes:
  pgdata:
